<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Recycle & Rewind</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
        <span class="navbar-brand fw-bold">
            <i class="bi bi-recycle text-success me-2"></i>Admin Panel
        </span>

        <a href="index.html" class="btn btn-outline-light btn-sm">
            <i class="bi bi-house"></i> Back to Site
        </a>
    </div>
</nav>

<div class="container py-4">

<!-- STATS -->
<div class="row g-4 mb-4">
    <div class="col-md-3">
        <div class="card bg-primary text-white p-3">
            <h3 id="adminTotalPickups">0</h3>
            <small>Total Pickups</small>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card bg-success text-white p-3">
            <h3 id="adminTotalWeight">0</h3>
            <small>Total Weight</small>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card bg-warning text-dark p-3">
            <h3>₹<span id="adminTotalValue">0</span></h3>
            <small>Total Value</small>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card bg-info text-white p-3">
            <h3 id="adminTotalUsers">0</h3>
            <small>Users</small>
        </div>
    </div>
</div>

<!-- TABLE -->
<div class="card shadow-sm">
    <div class="card-header d-flex justify-content-between">
        <h5><i class="bi bi-list-ul text-success"></i> Pickup Requests</h5>

        <button class="btn btn-outline-success btn-sm" onclick="loadAdminData()">
            Refresh
        </button>
    </div>

    <div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr>
                    <th>Date</th>
                    <th>Email</th>
                    <th>Items</th>
                    <th>Weight</th>
                    <th>Value</th>
                    <th>Address</th>
                    <th>Time</th>
                    <th>Status</th>
                    <th>Action</th> <!-- ✅ NEW -->
                </tr>
            </thead>

            <tbody id="adminPickupsTable"></tbody>
        </table>
    </div>
</div>

</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- Your Script -->
<script src="js/script.js"></script>

<script>
const ADMIN_EMAIL = "admin@gmail.com";

// 🔒 Admin protection
document.addEventListener("DOMContentLoaded", function () {
    firebase.auth().onAuthStateChanged(function (user) {
        if (user && user.email === ADMIN_EMAIL) {
            loadAdminData();
        } else {
            alert("Access Denied!");
            window.location.href = "login.html";
        }
    });
});

// ✅ UPDATE STATUS FUNCTION
function markAsCompleted(id, userEmail, userName, totalItems, amount) {

    db.collection("pickups").doc(id).update({
        status: "completed"
    })
    .then(() => {

        alert("Marked as completed ✅");

        // Send email AFTER update
        sendCompletionEmail(
            userEmail,
            userName,
            id,
            totalItems,
            amount
        );

        loadAdminData();

    })
    .catch(err => {
        console.error(err);
        alert("Error updating status");
    });
}

// ✅ LOAD ADMIN DATA
function loadAdminData() {
    db.collection("pickups")
    .orderBy("createdAt", "desc")
    .get()
    .then(snapshot => {

        let html = "";
        let totalPickups = 0;
        let totalWeight = 0;
        let totalValue = 0;
        let users = new Set();

        snapshot.forEach(doc => {
            const data = doc.data();
            const id = doc.id;

            totalPickups++;
            totalWeight += data.totalWeight || 0;
            totalValue += data.totalPrice || 0;
            users.add(data.userEmail);

            let items = "";
            if (data.items) {
                data.items.forEach(i => {
                    items += `${i.name} (${i.weight})<br>`;
                });
            }

            const statusBadge = data.status === "completed"
                ? `<span class="badge bg-success">Completed</span>`
                : `<span class="badge bg-warning">Pending</span>`;

            const actionBtn = data.status !== "completed"
                ? `<button class="btn btn-success btn-sm"
                        onclick="markAsCompleted('${id}')">
                        ✔ Done
                   </button>`
                : `<span class="text-success fw-bold">✔ Done</span>`;

            html += `
                <tr>
                    <td>${data.date || "-"}</td>
                    <td>${data.userEmail || "-"}</td>
                    <td>${items}</td>
                    <td>${data.totalWeight || 0} kg</td>
                    <td>₹${data.totalPrice || 0}</td>
                    <td>${data.address || "-"}</td>
                    <td>${data.timeSlot || "-"}</td>
                    <td>${statusBadge}</td>
                    <td>${actionBtn}</td>
                </tr>
            `;
        });

        document.getElementById("adminPickupsTable").innerHTML = html;

        // Stats
        document.getElementById("adminTotalPickups").textContent = totalPickups;
        document.getElementById("adminTotalWeight").textContent = totalWeight;
        document.getElementById("adminTotalValue").textContent = totalValue;
        document.getElementById("adminTotalUsers").textContent = users.size;
    });
}
</script>

</body>
</html>
