<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Recycle & Rewind</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">   
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-recycle text-success me-2"></i>
                <span class="text-success">Recycle</span> & <span class="text-primary">Rewind</span>
            </a>
        </div>
    </nav>

    <!-- Login/Signup Form -->
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card border-0 shadow-lg rounded-4">
                    <div class="card-body p-5">
                        <!-- Toggle Tabs -->
                        <ul class="nav nav-pills nav-justified mb-4" id="authTabs">
                            <li class="nav-item">
                                <button class="nav-link active rounded-pill" id="loginTab" onclick="showLogin()">
                                    Login
                                </button>
                            </li>
                            <li class="nav-item">
                                <button class="nav-link rounded-pill" id="signupTab" onclick="showSignup()">
                                    Sign Up
                                </button>
                            </li>
                        </ul>

                        <!-- Login Form -->
                        <div id="loginForm">
                            <div class="text-center mb-4">
                                <div class="auth-icon mb-3">
                                    <i class="bi bi-person-circle display-4 text-success"></i>
                                </div>
                                <h4 class="fw-bold">Welcome Back!</h4>
                                <p class="text-muted">Login to continue recycling</p>
                            </div>

                            <form onsubmit="loginUser(event)">
                                <div class="mb-3">
                                    <label class="form-label">Email Address</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0">
                                            <i class="bi bi-envelope text-muted"></i>
                                        </span>
                                        <input type="email" class="form-control border-start-0" 
                                               id="loginEmail" placeholder="you@example.com" required>
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label">Password</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0">
                                            <i class="bi bi-lock text-muted"></i>
                                        </span>
                                        <input type="password" class="form-control border-start-0" 
                                               id="loginPassword" placeholder="Enter password" required>
                                    </div>
                                </div>

                                <button type="submit" class="btn btn-success w-100 py-2 rounded-pill fw-bold">
                                    <i class="bi bi-box-arrow-in-right me-2"></i>Login
                                </button>
                            </form>
                        </div>

                        <!-- Signup Form -->
                        <div id="signupForm" style="display: none;">
                            <div class="text-center mb-4">
                                <div class="auth-icon mb-3">
                                    <i class="bi bi-person-plus display-4 text-success"></i>
                                </div>
                                <h4 class="fw-bold">Create Account</h4>
                                <p class="text-muted">Join the recycling revolution</p>
                            </div>

                            <form onsubmit="signupUser(event)">
                                <div class="mb-3">
                                    <label class="form-label">Full Name</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0">
                                            <i class="bi bi-person text-muted"></i>
                                        </span>
                                        <input type="text" class="form-control border-start-0" 
                                               id="signupName" placeholder="Your name" required>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Email Address</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0">
                                            <i class="bi bi-envelope text-muted"></i>
                                        </span>
                                        <input type="email" class="form-control border-start-0" 
                                               id="signupEmail" placeholder="you@example.com" required>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Phone Number</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0">
                                            <i class="bi bi-phone text-muted"></i>
                                        </span>
                                        <input type="tel" class="form-control border-start-0" 
                                               id="signupPhone" placeholder="10-digit number" required>
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label">Password</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0">
                                            <i class="bi bi-lock text-muted"></i>
                                        </span>
                                        <input type="password" class="form-control border-start-0" 
                                               id="signupPassword" placeholder="Min 6 characters" required>
                                    </div>
                                </div>

                                <button type="submit" class="btn btn-success w-100 py-2 rounded-pill fw-bold">
                                    <i class="bi bi-person-plus me-2"></i>Create Account
                                </button>
                            </form>
                        </div>

                        <!-- Alert Message -->
                        <div id="authMessage" class="alert mt-3 d-none" role="alert"></div>
                    </div>
                </div>

                <!-- Back to Home -->
                <div class="text-center mt-4">
                    <a href="index.html" class="text-muted text-decoration-none">
                        <i class="bi bi-arrow-left me-1"></i>Back to Home
                    </a>
                </div>
            </div>
        </div>
    </div>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">    <script src="[gstatic.com](https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js)"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">    <script src="[gstatic.com](https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js)"></script>
    <script src="js/script.js"></script>
    
    <script>
        // Toggle between Login and Signup forms
        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('signupForm').style.display = 'none';
            document.getElementById('loginTab').classList.add('active');
            document.getElementById('signupTab').classList.remove('active');
        }

        function showSignup() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('signupForm').style.display = 'block';
            document.getElementById('loginTab').classList.remove('active');
            document.getElementById('signupTab').classList.add('active');
        }
    </script>
</body>
</html>
