<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Recycle & Rewind</title>

    <!-- ✅ FIXED CDN LINKS (removed broken [ ]) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">
            <i class="bi bi-recycle text-success me-2"></i>
            <span class="text-success">Recycle</span> & <span class="text-primary">Rewind</span>
        </a>

        <!-- Toggle button FIX -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Collapsible menu -->
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="price.html">Price List</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="pickup.html">Book Pickup</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="#">Dashboard</a>
                </li>
                <li class="nav-item">
                    <button class="btn btn-outline-danger ms-3" onclick="logoutUser()">Logout</button>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ================= CONTENT ================= -->
<div class="container py-4">

    <!-- USER INFO -->
    <div class="card bg-success text-white rounded-4 shadow-sm mb-4">
        <div class="card-body">
            <h4>
                <i class="bi bi-person-circle me-2"></i>
                Welcome, <span id="userName">User</span> 👋
            </h4>
            <p class="mb-0" id="userEmail"></p>
        </div>
    </div>

    <!-- STATS -->
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card p-3 text-center">
                <h5>Total Pickups</h5>
                <h2 id="totalPickups">0</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-3 text-center">
                <h5>Total Weight</h5>
                <h2><span id="totalWeightStats">0</span> kg</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-3 text-center">
                <h5>Total Earnings</h5>
                <h2>₹<span id="totalEarnings">0</span></h2>
            </div>
        </div>
    </div>

    <!-- Scheduled Pickups -->
    <div class="card border-0 shadow-sm rounded-4 mb-4">
        <div class="card-header bg-white p-4">
            <h5 class="fw-bold mb-0 text-warning">
                <i class="bi bi-hourglass-split me-2"></i>
                Scheduled Pickups
            </h5>
        </div>
        <div class="card-body p-0" id="scheduledPickups"></div>
    </div>
    <!-- PICKUP HISTORY -->
    <div class="card">
        <div class="card-header">
            <h5 class="fw-bold mb-0 text-success">✅ Pickup History</h5>
        </div>
        <div class="card-body" id="pickupHistory">
            Loading...
        </div>
    </div>

</div>

<!-- ================= SCRIPTS ================= -->

<!-- ✅ FIXED JS LINKS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="js/script.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function () {

    firebase.auth().onAuthStateChanged(function(user) {

        if (!user) {
            window.location.href = 'login.html';
            return;
        }

        document.getElementById('userName').textContent = user.displayName || "User";
        document.getElementById('userEmail').textContent = user.email;

        db.collection('pickups')
          .where('userId', '==', user.uid)
          .get()
          .then((snapshot) => {

              let scheduledHTML = "";
              let historyHTML = "";

              let totalPickups = 0;
              let totalWeight = 0;
              let totalPrice = 0;

              if (snapshot.empty) {
                  document.getElementById("scheduledPickups").innerHTML = "<p>No scheduled pickups</p>";
                  document.getElementById("pickupHistory").innerHTML = "<p>No completed pickups</p>";
                  return;
              }

              snapshot.forEach(doc => {
                  const data = doc.data();

                  totalPickups++;
                  totalWeight += data.totalWeight || 0;
                  totalPrice += data.totalPrice || 0;

                  const card = `
                    <div class="border rounded p-3 mb-3">
                        <strong>${data.date}</strong> (${data.timeSlot})<br>
                        ₹${data.totalPrice} | ${data.totalWeight} kg<br>
                        <small>${data.address}</small><br>
                        <span class="badge ${data.status === 'completed' ? 'bg-success' : 'bg-warning'}">
                            ${data.status || 'pending'}
                        </span>
                    </div>
                  `;

                  if (data.status === "completed") {
                      historyHTML += card;
                  } else {
                      scheduledHTML += card;
                  }
              });

              document.getElementById("scheduledPickups").innerHTML = scheduledHTML;
              document.getElementById("pickupHistory").innerHTML = historyHTML;

              document.getElementById("totalPickups").textContent = totalPickups;
              document.getElementById("totalWeightStats").textContent = totalWeight;
              document.getElementById("totalEarnings").textContent = totalPrice;

          })
          .catch(err => {
              console.error("🔥 Firestore Error:", err);
          });

    });

});
</script>

</body>
</html>
